name: Build Android APK

# Build a signed release APK for free, with no monthly build cap.
# Runs on GitHub-hosted runners (free for public repos).
# Trigger manually from the Actions tab, or on push to main.

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".gitignore"

permissions:
  contents: read

jobs:
  build-apk:
    name: Build release APK
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Generate native Android project (expo prebuild)
        run: npx expo prebuild --platform android --no-install

      - name: Decode release keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "ANDROID_KEYSTORE_BASE64 secret is missing." >&2
            exit 1
          fi
          echo "$KEYSTORE_B64" | base64 -d > android/app/pantau-release.keystore
          echo "Keystore written ($(wc -c < android/app/pantau-release.keystore) bytes)."

      - name: Inject release signing config
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cat >> android/gradle.properties <<EOF

          # Injected by CI for release signing
          PANTAU_UPLOAD_STORE_FILE=pantau-release.keystore
          PANTAU_UPLOAD_KEY_ALIAS=${ANDROID_KEY_ALIAS}
          PANTAU_UPLOAD_STORE_PASSWORD=${ANDROID_KEYSTORE_PASSWORD}
          PANTAU_UPLOAD_KEY_PASSWORD=${ANDROID_KEY_PASSWORD}
          EOF
          node ./.github/scripts/patch-signing.js

      - name: Build release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mkdir -p out
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -n1)
          echo "Found APK: $APK"
          cp "$APK" "out/pantau-release.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pantau-release-apk
          path: out/pantau-release.apk
          if-no-files-found: error
          retention-days: 30
